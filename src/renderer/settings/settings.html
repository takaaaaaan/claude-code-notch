<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="settings.css" /></head>
<body>
  <nav id="tabs">
    <button data-tab="general" class="active" data-i18n="tab.general">一般</button>
    <button data-tab="connection" data-i18n="tab.connection">接続</button>
    <button data-tab="notifications" data-i18n="tab.notifications">通知</button>
    <button data-tab="appearance" data-i18n="tab.appearance">ノッチ表示</button>
    <button data-tab="character" data-i18n="tab.character">キャラ</button>
    <button data-tab="advanced" data-i18n="tab.advanced">詳細</button>
  </nav>
  <main>
    <section data-panel="general">
      <label><input type="checkbox" id="autostart" /> <span data-i18n="general.autostart">Windows 起動時に自動起動</span></label>
      <label><span data-i18n="general.language">言語</span>
        <select id="language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="ko">한국어</option>
        </select></label>
      <label><span data-i18n="general.theme">テーマ</span>
        <select id="theme">
          <option value="system" data-i18n="theme.system">システム</option>
          <option value="dark" data-i18n="theme.dark">ダーク</option>
          <option value="light" data-i18n="theme.light">ライト</option>
        </select></label>
    </section>
    <section data-panel="connection" hidden>
      <label><span data-i18n="connection.port">ポート</span> <input type="number" id="port" /></label>
      <p id="connStatus"></p>
      <button id="installHooks" data-i18n="connection.installHooks">Hooks をワンクリック登録</button>
      <button id="removeHooks" data-i18n="connection.removeHooks">Hooks を解除</button>
      <p id="hooksStatus"></p>
      <pre id="snippet"></pre>
    </section>
    <section data-panel="notifications" hidden>
      <label><span data-i18n="notifications.duration">表示秒数</span> <input type="range" id="duration" min="1000" max="10000" step="500" /> <span id="durationVal"></span></label>
      <label><input type="checkbox" data-ev="Stop" /> <span data-i18n="ev.Stop">タスク完了</span></label>
      <label><input type="checkbox" data-ev="Notification" /> <span data-i18n="ev.Notification">許可待ち</span></label>
      <label><input type="checkbox" data-ev="toolUse" /> <span data-i18n="ev.toolUse">ツール実行（キャラ変化）</span></label>
      <label><input type="checkbox" data-ev="subagent" /> <span data-i18n="ev.subagent">サブエージェント完了</span></label>
    </section>
    <section data-panel="appearance" hidden>
      <label><input type="checkbox" id="hoverReveal" /> <span data-i18n="appearance.hoverReveal">ホバーで表示</span></label>
      <label><span data-i18n="appearance.position">位置</span>
        <select id="preset">
          <option value="top-center" data-i18n="pos.top-center">上中央</option>
          <option value="top-left" data-i18n="pos.top-left">上左</option>
          <option value="top-right" data-i18n="pos.top-right">上右</option>
          <option value="left-center" data-i18n="pos.left-center">左端中央</option>
          <option value="right-center" data-i18n="pos.right-center">右端中央</option>
          <option value="bottom-left" data-i18n="pos.bottom-left">下左</option>
          <option value="bottom-right" data-i18n="pos.bottom-right">下右</option>
        </select></label>
      <label><span data-i18n="appearance.size">サイズ</span>
        <select id="size">
          <option value="small" data-i18n="size.small">小</option>
          <option value="medium" data-i18n="size.medium">中</option>
          <option value="large" data-i18n="size.large">大</option>
        </select></label>
      <label><span data-i18n="appearance.offsetX">横オフセット</span> <input type="number" id="offsetX" /></label>
      <label><span data-i18n="appearance.offsetY">縦オフセット</span> <input type="number" id="offsetY" /></label>
      <label><span data-i18n="appearance.monitor">モニター</span> <select id="displayId"></select></label>
    </section>
    <section data-panel="character" hidden>
      <label><input type="checkbox" id="charEnabled" /> <span data-i18n="character.enabled">キャラクターを表示</span></label>
    </section>
    <section data-panel="advanced" hidden>
      <p data-i18n="advanced.testTitle">テスト通知：</p>
      <button data-test="Stop" data-i18n="test.Stop">完了</button>
      <button data-test="Notification" data-i18n="test.Notification">許可待ち</button>
      <button data-test="PreToolUse" data-i18n="test.PreToolUse">作業中</button>
      <button data-test="SubagentStop" data-i18n="test.SubagentStop">サブ完了</button>
    </section>
  </main>
  <script src="i18n.js"></script>
  <script src="settings.js"></script>
</body>
</html>
